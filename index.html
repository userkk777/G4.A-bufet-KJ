<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka školního bufetu</title>

<style>
body {
 font-family: Arial, sans-serif;
 background: #f4f7fb;
}

h1 {
 text-align: center;
 background: #2a72d4;
 color: white;
 padding: 20px;
}

.container {
 width: 90%;
 max-width: 500px;
 margin: 30px auto;
 background: white;
 padding: 25px;
 border-radius: 12px;
}

.item {
 display: flex;
 justify-content: space-between;
 margin: 12px 0;
 font-size: 18px;
}

input[type="number"] {
 width: 70px;
 text-align: center;
}

/* ✅ NOVÁ POLE */
.input-field {
 width: 100%;
 padding: 10px;
 margin-top: 10px;
 border-radius: 8px;
 border: 1px solid #ccc;
 font-size: 16px;
}

#celkem, #pocet {
 text-align: center;
 font-size: 22px;
 margin-top: 15px;
 font-weight: bold;
 color: #2a72d4;
}

button {
 width: 100%;
 padding: 15px;
 margin-top: 20px;
 font-size: 24px;
 background: #ff6b35;
 color: white;
 border: none;
 border-radius: 10px;
 cursor: pointer;
}

button:hover {
 background: #e85a28;
}
</style>
</head>

<body>

<h1>SŠ Kostka – OBJEDNÁVKY BUFET</h1>

<div class="container">

 <div id="items"></div>

 <div id="celkem">Celková cena: 0 Kč</div>
 <div id="pocet">Počet kusů: 0</div>

 <!-- ✅ NOVÉ POVINNÉ INPUTY -->
 <input id="jmeno" class="input-field"
 placeholder="VAŠE JMÉNO (Příjmení Jméno)">

 <input id="telefon" class="input-field"
 placeholder="TELEFON (+420 000 000 000)">

 <!-- ✅ TLAČÍTKO -->
 <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>

let items = [];

async function loadCSV() {
 const response = await fetch("data_bufet.csv?t=" + Date.now());
 const text = await response.text();
 parseCSV(text);
 renderItems();
}

function parseCSV(text) {
 items = [];
 const lines = text.split("\n");

 for (let i = 1; i < lines.length; i++) {
  const line = lines[i].trim();
  if (!line) continue;

  const [nazev, cena] = line.split(";");

  items.push({
   nazev: nazev.trim(),
   cena: parseFloat(cena.replace(",", ".")),
   mnozstvi: 0
  });
 }
}

function renderItems() {
 const container = document.getElementById("items");
 container.innerHTML = "";

 items.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
   <span>${item.nazev} (${item.cena} Kč)</span>
   <input type="number" min="0" value="0"
   onchange="updateItem(${index}, this.value)">
  `;

  container.appendChild(div);
 });
}

function updateItem(index, value) {
 items[index].mnozstvi = parseInt(value) || 0;
 updateSummary();
}

function updateSummary() {
 let celkem = 0;
 let pocet = 0;

 items.forEach(item => {
  celkem += item.cena * item.mnozstvi;
  pocet += item.mnozstvi;
 });

 document.getElementById("celkem").innerText =
  "Celková cena: " + celkem.toFixed(2) + " Kč";

 document.getElementById("pocet").innerText =
  "Počet kusů: " + pocet;
}

/* ✅ HLAVNÍ FUNKCE S MAILTO */
function odeslatObjednavku() {

 const jmeno = document.getElementById("jmeno").value.trim();
 const telefon = document.getElementById("telefon").value.trim();

 /* ✅ VALIDACE */
 if (!jmeno || !telefon) {
  alert("Prosím vyplň jméno a telefon.");
  return;
 }

 const vybrane = items.filter(item => item.mnozstvi > 0);

 if (vybrane.length === 0) {
  alert("Nevybral jsi žádné položky!");
  return;
 }

 let celkem = 0;
 let pocet = 0;

 let body = "Nová objednávka bufet:\n\n";
 body += "Jméno: " + jmeno + "\n";
 body += "Telefon: " + telefon + "\n\n";

 vybrane.forEach(item => {
  const cena = item.cena * item.mnozstvi;
  celkem += cena;
  pocet += item.mnozstvi;

  body += `${item.nazev} - ${item.mnozstvi} ks - ${cena} Kč\n`;
 });

 body += "\n-----------------\n";
 body += "Celkem kusů: " + pocet + "\n";
 body += "Celková cena: " + celkem.toFixed(2) + " Kč";

 /* ✅ MAILTO KONSTRUKCE */
 const mailto =
  "mailto:jurcova.karolina@kostka-skola.cz" +
  "?subject=" + encodeURIComponent("Objednávka bufet") +
  "&body=" + encodeURIComponent(body);

 /* ✅ OTEVŘENÍ EMAILU */
 window.location.href = mailto;
}

loadCSV();

</script>

</body>
</html>
